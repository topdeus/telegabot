databases:
  - name: reminder-bot-db
    plan: free
    databaseName: reminder_bot
    user: reminder_bot

services:
  - type: web
    name: reminder-bot-web
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn bot_admin.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reminder-bot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: TELEGRAM_BOT_TOKEN
        sync: false

  - type: worker
    name: reminder-bot-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py run_bot
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reminder-bot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: TELEGRAM_BOT_TOKEN
        sync: false
